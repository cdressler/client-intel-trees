services:
  - type: web
    name: client-intelligence-tree
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production npm run start
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SITE_USER
        sync: false
      - key: SITE_PASSWORD
        sync: false
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
